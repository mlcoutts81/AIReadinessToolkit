<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ready Schools - Self-Evaluation Toolkit</title>
    
    <!-- Robust CDN Links -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.11/babel.min.js" crossorigin></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }

        /* High Contrast Themes */
        .high-contrast { background-color: #000 !important; color: #fff !important; }
        .high-contrast .bg-white { background-color: #111 !important; border-color: #ffffff !important; }
        .high-contrast .bg-slate-50 { background-color: #000 !important; }
        .high-contrast .text-slate-900, .high-contrast .text-slate-700, .high-contrast .text-slate-600 { color: #fff !important; }
        .high-contrast .border-slate-200, .high-contrast .border-slate-300 { border-color: #fff !important; }
        .high-contrast .bg-indigo-50 { background-color: #1a1a1a !important; border: 1px solid #fff !important; }
        .high-contrast .text-indigo-600 { color: #38bdf8 !important; }
        .high-contrast input, .high-contrast textarea { background-color: #000 !important; color: #fff !important; border: 1px solid #fff !important; }
        
        @media print { .no-print { display: none !important; } }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f8fafc; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e2e8f0;
            border-top: 4px solid #4f46e5; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #error-display { display: none; color: #dc2626; padding: 20px; text-align: center; max-width: 400px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Loading Screen -->
    <div id="loading-overlay">
        <div class="spinner mb-4"></div>
        <p id="loading-text" class="text-slate-600 font-medium">Loading Toolkit Components...</p>
        <div id="error-display">
            <p class="font-bold">Error Loading Application</p>
            <p class="text-sm mt-2">The AI Toolkit failed to initialize. This may be due to school internet filters blocking script CDNs (React/Babel).</p>
            <button onclick="window.location.reload()" class="mt-4 bg-indigo-600 text-white px-4 py-2 rounded">Try Again</button>
        </div>
    </div>

    <div id="root"></div>

    <!-- Diagnostic Script -->
    <script>
        window.addEventListener('error', function(e) {
            console.error("Global Error Caught:", e.message);
            const overlay = document.getElementById('loading-overlay');
            const errorDisp = document.getElementById('error-display');
            const loadingText = document.getElementById('loading-text');
            if (overlay) overlay.style.background = "#fff";
            if (loadingText) loadingText.style.display = "none";
            if (errorDisp) errorDisp.style.display = "block";
        });
    </script>

    <!-- Main Application Logic -->
    <script type="text/babel" data-presets="react,stage-2">
        const { useState, useMemo, useEffect } = React;

        // Simplified Icon Component using Emoji as fail-safe for broken SVG paths
        const Icon = ({ name }) => {
            const icons = {
                users: "👥",
                shield: "🛡️",
                book: "📖",
                globe: "🌐",
                layout: "📋",
                check: "✅",
                mail: "✉️",
                download: "💾",
                settings: "⚙️"
            };
            return <span className="text-xl" role="img" aria-hidden="true">{icons[name] || "•"}</span>;
        };

        const DOMAINS = [
            {
                id: 'leadership',
                title: 'AI Awareness for Educators',
                icon: 'users',
                description: "Identify current and future work developing staff awareness. This includes LA guidance, SQA positions, and purposeful task-first implementation.",
                questions: [
                    {
                        id: 'q1',
                        text: 'How established is staff awareness regarding LA guidance and SQA positions on AI?',
                        options: [
                            { label: 'Not yet shared with staff', value: 1 },
                            { label: 'Basic awareness sessions delivered', value: 4 },
                            { label: 'Actively shared via in-service days', value: 7 },
                            { label: 'Embedded in school culture and shared practice', value: 10 }
                        ]
                    },
                    {
                        id: 'q2',
                        text: 'Is the use of AI tools purposeful (task-first)?',
                        options: [
                            { label: 'Tools often used "just because"', value: 2 },
                            { label: 'Focus on identifying challenges first', value: 5 },
                            { label: 'Consistent focus on purposeful use', value: 10 }
                        ]
                    }
                ]
            },
            {
                id: 'students',
                title: 'AI Ethics & Risks for Students',
                icon: 'shield',
                description: "Work developing ethics, bias, and risk awareness, including responsible use and misinformation education.",
                questions: [
                    {
                        id: 'q3',
                        text: 'To what extent is Al ethics integrated into the curriculum?',
                        options: [
                            { label: 'Not covered', value: 1 },
                            { label: 'Taught in specific ICT lessons', value: 4 },
                            { label: 'Broad inclusion across levels', value: 8 },
                            { label: 'Core part of Digital Literacy', value: 10 }
                        ]
                    }
                ]
            },
            {
                id: 'pedagogy',
                title: 'Hands-on Learning',
                icon: 'book',
                description: "Student use of tools (e.g. Adobe Express) and clear categorization of Al permissibility.",
                questions: [
                    {
                        id: 'q4',
                        text: 'How clear is the school regarding AI permissibility levels?',
                        options: [
                            { label: 'No clear policy shared', value: 1 },
                            { label: 'Policies exist but are inconsistent', value: 4 },
                            { label: 'Clear communication for all tasks', value: 8 },
                            { label: 'Students select tools based on ethical tiers', value: 10 }
                        ]
                    }
                ]
            },
            {
                id: 'community',
                title: 'Parental Engagement',
                icon: 'globe',
                description: "Workshops, newsletters, and partnerships to increase awareness among families.",
                questions: [
                    {
                        id: 'q6',
                        text: 'How do you communicate the school\'s Al position to parents?',
                        options: [
                            { label: 'No communication yet', value: 1 },
                            { label: 'Resources provided occasionally', value: 5 },
                            { label: 'Regular workshops and consultation', value: 10 }
                        ]
                    }
                ]
            },
            {
                id: 'strategy',
                title: 'AI in Digital Strategy',
                icon: 'layout',
                description: "Embedding Al in learning policies, considering data privacy, and ethical frameworks.",
                questions: [
                    {
                        id: 'q7',
                        text: 'Is AI literacy explicitly defined within the Digital Strategy?',
                        options: [
                            { label: 'Not mentioned', value: 1 },
                            { label: 'Technical skill only', value: 4 },
                            { label: 'Includes ethics, privacy, and inclusivity', value: 8 },
                            { label: 'Aligned with national frameworks', value: 10 }
                        ]
                    }
                ]
            }
        ];

        const App = () => {
            const [view, setView] = useState('intro');
            const [currentDomainIdx, setCurrentDomainIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [actionPlans, setActionPlans] = useState({});
            const [schoolInfo, setSchoolInfo] = useState({ name: '', la: '' });
            const [highContrast, setHighContrast] = useState(false);
            const [contactMessage, setContactMessage] = useState('');

            useEffect(() => {
                // Remove loader once React is ready
                const loader = document.getElementById('loading-overlay');
                if (loader) loader.style.display = 'none';
                console.log("App Initialized Successfully");
            }, []);

            const score = useMemo(() => {
                const values = Object.values(answers);
                if (values.length === 0) return 0;
                return Math.round((values.reduce((a, b) => a + b, 0) / values.length) * 10) / 10;
            }, [answers]);

            const getStatus = (s) => {
                if (s < 3) return { label: 'Emerging', color: 'text-red-600', bg: 'bg-red-50', border: 'border-red-600' };
                if (s < 6) return { label: 'Developing', color: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-600' };
                if (s < 9) return { label: 'Proficient', color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-600' };
                return { label: 'Confident', color: 'text-green-600', bg: 'bg-green-50', border: 'border-green-600' };
            };

            const status = getStatus(score);

            const handleEmail = (e) => {
                e.preventDefault();
                const recipient = "glow.engagement@educationscotland.gov.scot";
                const subject = `AI Evaluation: ${schoolInfo.name}`;
                const body = `School: ${schoolInfo.name}\nAuthority: ${schoolInfo.la}\nScore: ${score}/10\n\nMessage: ${contactMessage}`;
                window.location.href = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            };

            const currentDomain = DOMAINS[currentDomainIdx];

            return (
                <div className={`min-h-screen p-4 md:p-8 transition-colors ${highContrast ? 'high-contrast' : ''}`}>
                    <div className="max-w-4xl mx-auto">
                        <header className="flex justify-between items-center mb-8 border-b pb-6 border-slate-200">
                            <div>
                                <h1 className="text-2xl font-bold">AI Ready Schools</h1>
                                <p className="text-sm opacity-70">Self-Evaluation Toolkit</p>
                            </div>
                            <button onClick={() => setHighContrast(!highContrast)} className="text-sm px-4 py-2 border rounded-full no-print">
                                {highContrast ? 'Standard Mode' : 'High Contrast'}
                            </button>
                        </header>

                        {view === 'intro' && (
                            <div className="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-slate-200">
                                <h2 className="text-3xl font-bold mb-4">Evaluate your school.</h2>
                                <p className="text-lg opacity-80 mb-8 leading-relaxed">Assess your progress and plan future actions for staff awareness, student ethics, and strategic policy.</p>
                                <div className="grid md:grid-cols-2 gap-6 mb-8">
                                    <input type="text" placeholder="School Name" className="p-3 border rounded-lg" value={schoolInfo.name} onChange={e => setSchoolInfo({...schoolInfo, name: e.target.value})} />
                                    <input type="text" placeholder="Local Authority" className="p-3 border rounded-lg" value={schoolInfo.la} onChange={e => setSchoolInfo({...schoolInfo, la: e.target.value})} />
                                </div>
                                <button onClick={() => setView('evaluate')} className="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold shadow-lg">Start Evaluation</button>
                            </div>
                        )}

                        {view === 'evaluate' && (
                            <div className="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                                <div className="bg-indigo-50 p-6 flex items-center gap-3">
                                    <Icon name={currentDomain.icon} />
                                    <h2 className="text-xl font-bold">{currentDomain.title}</h2>
                                </div>
                                <div className="p-6 md:p-10 space-y-8">
                                    <p className="text-sm italic opacity-70">{currentDomain.description}</p>
                                    {currentDomain.questions.map(q => (
                                        <div key={q.id} className="space-y-4">
                                            <p className="font-semibold text-lg">{q.text}</p>
                                            <div className="grid gap-3">
                                                {q.options.map(opt => (
                                                    <button key={opt.label} onClick={() => setAnswers({...answers, [q.id]: opt.value})} className={`w-full text-left p-4 rounded-xl border transition-all ${answers[q.id] === opt.value ? 'border-indigo-600 bg-indigo-50 ring-1 ring-indigo-600' : 'border-slate-200'}`}>
                                                        {opt.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                    <div className="pt-6 border-t border-slate-100">
                                        <p className="font-bold mb-2">Planned Activities</p>
                                        <textarea className="w-full p-4 border rounded-xl h-32" value={actionPlans[currentDomain.id] || ''} onChange={e => setActionPlans({...actionPlans, [currentDomain.id]: e.target.value})} placeholder="What are your next steps in this area?" />
                                    </div>
                                </div>
                                <div className="p-6 bg-slate-50 border-t flex justify-between no-print">
                                    <button onClick={() => currentDomainIdx === 0 ? setView('intro') : setCurrentDomainIdx(currentDomainIdx - 1)} className="font-bold">Back</button>
                                    <button onClick={() => currentDomainIdx === DOMAINS.length - 1 ? setView('results') : setCurrentDomainIdx(currentDomainIdx + 1)} className="bg-indigo-600 text-white px-8 py-2 rounded-lg font-bold">Next</button>
                                </div>
                            </div>
                        )}

                        {view === 'results' && (
                            <div className="space-y-8">
                                <div className="bg-white p-8 md:p-12 rounded-2xl shadow-xl border border-slate-200 text-center">
                                    <h2 className="text-2xl font-bold mb-6">Readiness Score</h2>
                                    <div className={`w-40 h-40 mx-auto rounded-full border-8 ${status.border} flex flex-col items-center justify-center mb-6`}>
                                        <span className="text-5xl font-black">{score}</span>
                                        <span className="text-xs font-bold opacity-50">/ 10</span>
                                    </div>
                                    <div className={`inline-block px-6 py-2 rounded-full font-bold text-lg mb-8 ${status.bg} ${status.color}`}>{status.label}</div>
                                    <div className="flex gap-4 justify-center no-print">
                                        <button onClick={() => window.print()} className="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold">Print Results</button>
                                        <button onClick={() => setView('intro')} className="px-6 py-3 font-bold text-indigo-600">Restart</button>
                                    </div>
                                </div>

                                <div className="bg-white p-8 rounded-2xl border border-slate-200 no-print">
                                    <h3 className="text-xl font-bold mb-4 flex items-center gap-2">Need Further Support?</h3>
                                    <p className="opacity-70 mb-6 text-sm">Email the Glow Engagement Team directly to discuss these results.</p>
                                    <form onSubmit={handleEmail} className="space-y-4">
                                        <textarea className="w-full p-4 border rounded-xl h-32" value={contactMessage} onChange={e => setContactMessage(e.target.value)} placeholder="Message..." required />
                                        <button type="submit" className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold">Email Education Scotland</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
